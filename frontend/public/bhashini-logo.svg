<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2" fill="none"/>
  <!-- Devanagari shirorekha (top bar) on left half -->
  <line x1="6" y1="15" x2="22" y2="15" stroke="currentColor" stroke-width="2.5"/>
  <!-- Devanagari vertical stroke -->
  <line x1="14" y1="15" x2="14" y2="35" stroke="currentColor" stroke-width="2.5"/>
  <!-- Devanagari curve (simplified भा) -->
  <path d="M10 15 L10 24 Q10 29 14 29" stroke="currentColor" stroke-width="2" fill="none"/>
  <line x1="14" y1="29" x2="18" y2="29" stroke="currentColor" stroke-width="2"/>
  <!-- Divider -->
  <line x1="24" y1="8" x2="24" y2="40" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- Latin A on right half -->
  <path d="M30 35 L34 13 L38 35" stroke="currentColor" stroke-width="2.5" fill="none"/>
  <line x1="31.5" y1="27" x2="36.5" y2="27" stroke="currentColor" stroke-width="2"/>
</svg>
